name: Katabump Auto Renew

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0点自动运行
  workflow_dispatch: # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          # 安装项目原有的依赖和新增的 axios
          npm install
          npm install playwright-extra puppeteer-extra-plugin-stealth axios
          npx playwright install chromium

      - name: Run Auto Renew Script
        env:
          # 以下变量请务必在 GitHub 仓库的 Settings -> Secrets 中配置好
          USERS_JSON: ${{ secrets.USERS_JSON }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-screenshots
          path: screenshots/
          retention-days: 7
