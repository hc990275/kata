name: Katabump Auto Renew

on:
  schedule:
    # 每天 UTC 0点 和 12点 (对应北京时间 8点 和 20点) 运行
    # 语法说明: 分(0) 时(0和12) 日(*) 月(*) 星期(*)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发工作流

jobs:
  renew:
    # 指定运行环境为最新版的 Ubuntu
    runs-on: ubuntu-latest
    env:
      # 强制使用 Node.js 24 运行 JavaScript Actions，避免部分兼容性警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    # 1. 拉取代码仓库
    - name: Checkout Repository
      uses: actions/checkout@v5
    
    # 2. 配置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20' # 指定 Node.js 版本为 20
        
    # 3. 安装系统依赖和项目依赖
    - name: Install Dependencies
      run: |
        sudo apt-get update
        # 安装 xvfb 用于在没有物理显示器的服务器上模拟图形界面 (X11 虚拟显示)
        sudo apt-get install -y xvfb
        # 安装 package.json 中的 Node 依赖
        npm install
        # 安装 Playwright 所需的浏览器依赖 (此处指定安装 Chromium)
        npx playwright install-deps chrome
      
    # 4. 执行自动续期脚本
    - name: Run Renew Script
      env:
        # 下列机密信息需要在 GitHub Repository -> Settings -> Secrets and variables -> Actions 中进行配置
        # USERS_JSON 格式示例: [{"username": "xxx", "password": "xxx"}]
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }} # 代理设置 (如果需要)
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }} # Telegram 机器人 Token 用于通知
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }} # Telegram 接收通知的用户 ID
      # 使用 xvfb-run 启动虚拟桌面环境，以此运行 node 脚本，确保需要 GUI 的浏览器操作能正常执行
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

    # 5. 上传截图文件 (无论成功还是失败都会执行)
    - name: Upload Screenshots
      if: always() # 确保即使前面的步骤报错，也能保存报错时的截图以便排查问题
      uses: actions/upload-artifact@v5
      with:
        name: screenshots # 上传的构建产物名称
        path: screenshots/ # 指定要上传的截图文件夹路径
